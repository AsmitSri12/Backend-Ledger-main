services:
  # Backend Web Service
  - type: web
    name: backend-ledger
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: MONGO_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CLIENT_ID
        sync: false
      - key: CLIENT_SECRET
        sync: false
      - key: REFRESH_TOKEN
        sync: false
      - key: EMAIL_USER
        sync: false

  # Frontend Web Service
  - type: web
    name: frontend-ledger
    env: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: BACKEND_URL
        fromService:
          type: web
          name: backend-ledger
          envVarKey: RENDER_EXTERNAL_URL
      - key: NEXT_PUBLIC_API_URL
        value: ${BACKEND_URL}/api
